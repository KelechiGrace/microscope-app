<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Microscope Calculator</h2>

<form method="POST" enctype="multipart/form-data">

<input name="username" placeholder="Username" required>

<input name="size" type="number" step="any" placeholder="Measured size (mm)" required>

<!-- IMAGE UPLOAD FIELD -->
<input type="file" name="image">

<select name="microscope">
{% for m in microscopes %}
<option value="{{m}}">{{m}}</option>
{% endfor %}
</select>

<select name="unit">
{% for u in units %}
<option value="{{u}}">{{u}}</option>
{% endfor %}
</select>

<button type="submit">Calculate</button>
</form>

{% if result %}
<h3>Result: {{result}}</h3>
{% endif %}

<a href="/records">View Records</a>

</body>
</html>
